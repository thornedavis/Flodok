<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="color-scheme" content="light only">
  <meta name="supported-color-schemes" content="light">
  <title>Confirm it's you</title>
</head>
<body style="margin:0; padding:0; background-color:#f3f4f6; -webkit-text-size-adjust:100%; -ms-text-size-adjust:100%;">
  <div style="display:none; max-height:0; overflow:hidden; opacity:0; font-size:1px; line-height:1px; color:#f3f4f6;">
    Your Flodok verification code.
  </div>

  <table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0" style="background-color:#f3f4f6;">
    <tr>
      <td align="center" style="padding:40px 16px;">

        <table role="presentation" width="560" cellpadding="0" cellspacing="0" border="0" style="width:560px; max-width:100%; background-color:#ffffff; border:1px solid #e5e7eb; border-radius:14px;">
          <tr>
            <td style="padding:32px 40px 0 40px;">
              <table role="presentation" cellpadding="0" cellspacing="0" border="0">
                <tr>
                  <td style="vertical-align:middle;"><img src="https://flodok.com/apple-touch-icon.png" width="36" height="36" alt="Flodok" style="display:block; border-radius:8px;" /></td>
                  <td style="padding-left:11px; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif; font-size:18px; font-weight:600; color:#111827; letter-spacing:-0.01em;">Flodok</td>
                </tr>
              </table>
            </td>
          </tr>

          <tr>
            <td style="padding:28px 40px 0 40px;">
              <h1 style="margin:0 0 14px 0; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif; font-size:23px; font-weight:600; color:#111827; line-height:1.3; letter-spacing:-0.01em;">Confirm it's you</h1>
              <p style="margin:0; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif; font-size:15px; color:#4b5563; line-height:1.65;">
                Enter this code in <strong style="color:#111827; font-weight:600;">Flodok</strong> to confirm your identity and continue.
              </p>
            </td>
          </tr>

          <!-- Verification code -->
          <tr>
            <td style="padding:24px 40px 0 40px;">
              <table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0">
                <tr>
                  <td align="center" style="background-color:#f9fafb; border:1px solid #e5e7eb; border-radius:10px; padding:20px;">
                    <span style="font-family:'SFMono-Regular',Consolas,Menlo,Courier,monospace; font-size:32px; font-weight:700; letter-spacing:10px; color:#111827;">{{ .Token }}</span>
                  </td>
                </tr>
              </table>
            </td>
          </tr>

          <tr>
            <td style="padding:24px 40px 32px 40px;">
              <table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0">
                <tr><td style="border-top:1px solid #f0f1f3; padding-top:18px;">
                  <p style="margin:0; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif; font-size:13px; color:#9ca3af; line-height:1.6;">
                    This code expires shortly. If you didn't request it, you can safely ignore this email.
                  </p>
                </td></tr>
              </table>
            </td>
          </tr>
        </table>

        <table role="presentation" width="560" cellpadding="0" cellspacing="0" border="0" style="width:560px; max-width:100%;">
          <tr>
            <td align="center" style="padding:22px 16px 0 16px;">
              <p style="margin:0; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif; font-size:12px; color:#9ca3af; line-height:1.5;">Flodok for Indonesia's best teams</p>
            </td>
          </tr>
        </table>

      </td>
    </tr>
  </table>
</body>
</html>
