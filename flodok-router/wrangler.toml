name = "flodok-router"
main = "src/index.ts"
compatibility_date = "2025-04-10"
# nodejs_compat is required by @cloudflare/puppeteer (PDF endpoint).
# Browser Rendering itself is bound separately below; this flag lets the
# puppeteer client library use Node-style imports.
compatibility_flags = ["nodejs_compat"]

# Cloudflare Browser Rendering — used by the /pdf endpoint to spin up a
# headless Chromium, set the rendered document HTML, and capture a PDF.
# Browser Rendering must be enabled on the account (Workers Paid plan)
# and the binding deployed via `wrangler deploy`.
[browser]
binding = "BROWSER"

[observability]
[observability.logs]
enabled = true
invocation_logs = true
[observability.traces]

[[kv_namespaces]]
binding = "KV"
id = "f7df54fda6344607ace5b4ae932452fa"

# For local dev, use a preview KV namespace
# preview_id = "REPLACE_WITH_PREVIEW_KV_NAMESPACE_ID"

[triggers]
# Every 5 min: Fireflies transcript polling fan-out.
# Daily at 18:00 UTC (01:00 WIB): compensation period auto-close. The Worker
# dispatches on controller.cron to tell the two triggers apart.
crons = ["*/5 * * * *", "0 18 * * *"]
